{% extends 'base.html' %}
{% block title %}Login • Portal de Insumos J&T{% endblock %}
{% block page_title %}Acesso ao Portal{% endblock %}
{% block page_subtitle %}Entre com seu nome de usuário e senha para acessar o portal.{% endblock %}
{% block content %}
<section class="auth-card card">
  <form method="post" class="form-grid">
    <label>
      Nome de usuário
      <input name="username" type="text" placeholder="Ex.: admin" autocomplete="username" required>
    </label>
    <label>
      Senha
      <input name="password" type="password" placeholder="Sua senha" required>
    </label>
    <button class="btn primary" type="submit">Entrar</button>
  </form>
</section>
{% endblock %}
